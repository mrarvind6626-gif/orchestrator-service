# =============================================================================
# NeMo Guardrails Configuration — ACPC Gujarat Chatbot
# =============================================================================
#
# STRATEGY: Allowlist / Catch-All
# --------------------------------
# Instead of trying to enumerate every possible off-topic category (weather,
# coding, finance, etc.), we define ONLY what the bot IS allowed to talk about
# (ACPC Gujarat admissions).  Everything else is caught by a single wildcard
# flow in rails.co and refused with a hardcoded string.
#
# WHY THIS IS BETTER:
#   - Blocklist approach requires anticipating every off-topic category.
#     Miss one and it slips through.
#   - Allowlist approach is secure by default: anything not explicitly
#     permitted is denied.  New off-topic categories are blocked automatically
#     without any config changes.
#
# MODEL CHOICE:
#   We use gpt-4o-mini via the standard OpenAI engine.  It is cheap (~$0.15
#   per 1M input tokens), fast (<500ms), and accurate enough for intent
#   classification.  NeMo only uses the LLM to classify user intent — the
#   actual RAG answer is generated by the main pipeline, not by this model.
#
# ENVIRONMENT VARIABLES REQUIRED:
#   OPENAI_API_KEY  — Your OpenAI API key (used by NeMo's internal client)
#
# FILES IN THIS DIRECTORY:
#   config.yml  — This file.  LLM backend and rail activation settings.
#   rails.co    — Colang flow definitions (allowlist intents + catch-all).
#
# INSTALL:  pip install nemoguardrails
# DOCS:     https://github.com/NVIDIA/NeMo-Guardrails
# =============================================================================


# -----------------------------------------------------------------------------
# 1. MODEL CONFIGURATION
# -----------------------------------------------------------------------------
# NeMo Guardrails uses this model internally for two things:
#   a) Intent classification — mapping the user's message to a defined intent
#   b) Bot response generation — selecting the appropriate canned response
#
# The "engine: openai" tells NeMo to use the standard OpenAI Python SDK.
# It will read OPENAI_API_KEY from the environment automatically.
# -----------------------------------------------------------------------------
# NeMo 0.10+ defaults to Colang v2.  Our flows use Colang v1 syntax
# (define user / define bot / define flow), so we must pin to v1.
colang_version: "1.0"

models:
  - type: main
    engine: openai
    # When using OpenRouter (OPENAI_API_BASE=https://openrouter.ai/api/v1),
    # the model slug needs the provider prefix.  For direct OpenAI, use just "gpt-4o-mini".
    model: openai/gpt-4o-mini


# -----------------------------------------------------------------------------
# 2. SYSTEM INSTRUCTIONS
# -----------------------------------------------------------------------------
# These instructions prime the LLM for intent classification.  They tell the
# model what role it plays, which helps it correctly classify user messages
# as on-topic (ACPC admissions) or off-topic (everything else).
#
# IMPORTANT: These instructions are ONLY used by NeMo's internal LLM for
# classification.  The actual chatbot response is generated by the main
# pipeline's LLM (configured separately in app/config.py).
# -----------------------------------------------------------------------------
instructions:
  - type: general
    content: |
      You are the ACPC Gujarat Admissions Assistant security layer.  Your ONLY
      job is to classify whether a user's message is related to ACPC Gujarat
      admissions or not.

      ALLOWED TOPICS (on-topic):
        - ACPC registration, login, portal usage
        - Eligibility criteria (academic, domicile, age, category)
        - Merit rank calculation (GUJCET, JEE Main, board marks, normalization)
        - Choice filling strategy and preferences
        - Seat allotment process and results
        - Counselling rounds (regular rounds, vacancy rounds, spot rounds)
        - Cut-off ranks and closing ranks (branch-wise, college-wise, category-wise)
        - College information (approved colleges, courses, intake, fees, accreditation)
        - Document verification and reporting
        - Fees, refund policies, and payment procedures
        - Reservation policies (SC, ST, OBC, EWS, TFWS, PH categories)
        - Seat acceptance, freezing, upgrading, and withdrawal
        - Important dates, deadlines, and academic calendar
        - Helpline numbers, contact information, and grievance redressal
        - Diploma-to-degree (D2D) and lateral entry admissions
        - Management quota and NRI quota seats
        - Hostel allotment and accommodation queries

      EVERYTHING ELSE is off-topic and must be refused.


# -----------------------------------------------------------------------------
# 3. DIALOG RAILS (no explicit input/output rail configuration)
# -----------------------------------------------------------------------------
# We intentionally do NOT list our flows under rails.input.flows.
#
# WHY: In Colang v1.0, flows listed under rails.input.flows are treated as
# sequential validation gates — they run WITHOUT LLM intent classification.
# That defeats our allowlist strategy, which relies on the LLM classifying
# the user's intent and matching it against "ask acpc admission".
#
# Instead, we leave the rails section with empty input/output flows.
# NeMo's dialog engine will:
#   1. Call the LLM to classify the user's intent against defined intents
#   2. Match the classified intent to the appropriate flow in rails.co
#   3. "allow acpc queries" fires for on-topic, "catch all off topic" fires
#      for everything else (via the `user ...` wildcard)
# -----------------------------------------------------------------------------
rails:
  input:
    flows: []
  output:
    flows: []
