# ══════════════════════════════════════════════════════════════
#  Nginx — Reverse Proxy for Orchestrator Service
# ══════════════════════════════════════════════════════════════
#
#  Port 80 only (no SSL).
#  CORS headers for S3 static website origin.
#  Extended timeouts for synchronous GenAI pipeline.
#
# ══════════════════════════════════════════════════════════════

upstream fastapi_backend {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options       "DENY"              always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection      "1; mode=block"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Request Size Limit (audio uploads up to 6MB) ──────────
    client_max_body_size 6m;

    # ── Timeouts for long-running GenAI requests ──────────────
    proxy_connect_timeout  30s;
    proxy_send_timeout     120s;
    proxy_read_timeout     120s;
    send_timeout           120s;

    # ── Health Check (no CORS needed) ─────────────────────────
    location /health {
        proxy_pass http://fastapi_backend/health;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API Endpoints (CORS enabled) ─────────────────────────
    location /v1/ {
        # ── CORS Preflight ────────────────────────────────────
        if ($request_method = 'OPTIONS') {
            # Replace this value with your S3 bucket website URL
            add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, X-Request-ID' always;
            add_header 'Access-Control-Max-Age'       '86400';
            add_header 'Content-Length'                '0';
            add_header 'Content-Type'                 'text/plain';
            return 204;
        }

        # ── CORS Response Headers ─────────────────────────────
        add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, X-Request-ID' always;

        # ── Proxy to FastAPI ──────────────────────────────────
        proxy_pass         http://fastapi_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_http_version 1.1;
    }

    # ── Docs (optional, disable in production) ────────────────
    location /docs {
        proxy_pass http://fastapi_backend/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://fastapi_backend/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://fastapi_backend/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Default: 404 ──────────────────────────────────────────
    location / {
        return 404 '{"detail": "Not found"}';
        add_header Content-Type application/json;
    }
}
